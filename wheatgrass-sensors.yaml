esphome:
  name: wheatgrass-sensors
  friendly_name: wheatgrass sensors

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wheatgrass-Sensors"
    password: !secret ap_password

captive_portal:
i2c:
  sda: 21
  scl: 22
  scan: true
  id: bus_a

sensor:
  # ---- BME280 (0x76)
  - platform: bme280_i2c
    address: 0x76
    i2c_id: bus_a
    temperature:
      name: "Temperature"
    humidity:
      name: "Humidity"
    pressure:
      name: "Pressure"
    update_interval: 0.5s
